spring.application.name=demo

# Supabase (PostgreSQL) Configuration
# You can find these details in Supabase Dashboard > Project Settings > Database
# Replace <db-url> with your connection string details or use the individual properties below
spring.datasource.url=jdbc:postgresql://<host>:<port>/postgres
spring.datasource.username=postgres
spring.datasource.password=<your-password>
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Settings
demo.app.jwtSecret=======================GeneratedJwtSecretKeyForDemoApplication=======================
demo.app.jwtExpirationMs=86400000
